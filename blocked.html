<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="blocked-container">
    <div class="blocked-card">
      <img src="icon.png" alt="Blocked" class="blocked-icon">
      <h1>Site Blocked</h1>
      <p class="site-url" id="blockedSite"></p>
      <p class="message">This website has been blocked by the AI & Productivity Blocker extension.</p>
      
      <div class="password-section">
        <p>Enter password to temporarily unblock (1 hour):</p>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button id="unblockBtn">Unblock for 1 hour</button>
        <p id="errorMessage" class="error-message"></p>
      </div>
      
      <p class="note">Note: Google Docs, Sheets, and Slides are also blocked to improve productivity.</p>
    </div>
  </div>
  
  <script src="blocked.js"></script>
</body>
</html>
